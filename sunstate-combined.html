                <p style=&quot;margin:0 0 6px 0; font-size:14px; font-weight:700; color:#1a2744;&quot;>Monthly Insights</p>
                <p style=&quot;margin:0 0 8px 0; font-size:13px; color:#444; line-height:1.6;&quot;><strong>1.</strong> All 5 A-tier facilities showed strong intra-month growth, with Banner Boswell leading at +62.5%. The admissions pipeline appears healthy at the top of the portfolio.</p>
                <p style=&quot;margin:0 0 8px 0; font-size:13px; color:#444; line-height:1.6;&quot;><strong>2.</strong> B-tier facilities are performing well with 6 of 7 in growth territory. Encompass Health and Wellsprings both doubled their Week 1 volume by Week 4.</p>
                <p style=&quot;margin:0 0 8px 0; font-size:13px; color:#444; line-height:1.6;&quot;><strong>3.</strong> Only 2 facilities flagged: Center at Arrowhead (-33.3%) and Tempe Post Acute (-50.0%), both C-tier. Recommend checking in but low strategic risk.</p>
                <p style=&quot;margin:0; font-size:13px; color:#444; line-height:1.6;&quot;><strong>4.</strong> The Week 1 &amp;rarr; Week 4 ramp from 65 to 97 STR admissions suggests momentum building. If this trend carries into March, expect a strong Q1 close.</p>

function EditorField({label, value, onChange, multi, mono: isMono}) {
  const base = {width:"100%",padding:"7px 10px",borderRadius:6,border:"1px solid "+C.border,background:C.bg,color:C.text,fontSize:12,fontFamily:"'DM Sans', sans-serif"};
  const style = {...base, ...(isMono ? {fontFamily:mono,fontSize:11} : {}), ...(multi ? {resize:"vertical",minHeight:54} : {})};
  return e("div",{style:{marginBottom:8}},
    e("label",{style:{fontSize:9,fontWeight:600,color:C.textDim,letterSpacing:"0.05em",display:"block",marginBottom:3,textTransform:"uppercase"}},label),
    multi ? e("textarea",{value:value||"",onChange:ev=>onChange(ev.target.value),style}) : e("input",{type:"text",value:value||"",onChange:ev=>onChange(ev.target.value),style})
  );
}

      // Delete all children then re-insert
      const childTables = ["vm_flow_steps","vm_stats","vm_scope_items","vm_proto_tabs","vm_how_steps","vm_tiers","vm_severities","vm_cadences","vm_tech_stack","vm_scenarios","vm_limits"];

  function upd(path, value) {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split(".");
      let obj = next;
      for (let i = 0; i < keys.length - 1; i++) {
        const k = /^\d+$/.test(keys[i]) ? parseInt(keys[i]) : keys[i];
        obj = obj[k];
      }
      const last = /^\d+$/.test(keys[keys.length-1]) ? parseInt(keys[keys.length-1]) : keys[keys.length-1];
      obj[last] = value;
      return next;
    });
  }
  function addItem(path, template) {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split(".");
      let obj = next;
      for (let i = 0; i < keys.length; i++) { obj = obj[/^\d+$/.test(keys[i]) ? parseInt(keys[i]) : keys[i]]; }
      obj.push(JSON.parse(JSON.stringify(template)));
      return next;
    });
  }
  function removeItem(path, index) {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split(".");
      let obj = next;
      for (let i = 0; i < keys.length; i++) { obj = obj[/^\d+$/.test(keys[i]) ? parseInt(keys[i]) : keys[i]]; }
      obj.splice(index, 1);
      return next;
    });
  }

          ["VM-01: On-demand (Daily)","VM-02: On-demand (Weekly)","VM-03: On-demand (Monthly)","VM-04: On-demand (Quarterly)"].map((item,i)=>e("div",{key:i,style:{display:"flex",alignItems:"center",gap:8,fontSize:12,color:C.textMid,padding:"4px 0"}},e("div",{style:{width:6,height:6,borderRadius:"50%",background:C.orange,flexShrink:0}}),item)),
          e("div",{style:{marginTop:8,fontSize:11,color:C.textDim}},"All scenarios use Start Subscenario"),e("div",{style:{fontSize:11,color:C.textDim}},"Phase 2 adds cron scheduling")
        )
      ),
      // Scenarios
      e("div",{style:{fontSize:12,fontWeight:600,color:C.accent,letterSpacing:"0.04em",marginBottom:12,textTransform:"uppercase"}},"Scenario Specifications"),
      e("div",{style:{display:"flex",flexDirection:"column",gap:10,marginBottom:24}},
        data.scenarios.map((sc,si)=>{
          const isExp=expandedScenario===sc.id.toLowerCase().replace("-","");
          const scKey=sc.id.toLowerCase().replace("-","");
          return e("div",{key:si,style:{borderRadius:12,border:"1px solid "+(isExp?sc.color+"44":C.border),overflow:"hidden"}},
            e("div",{onClick:()=>setExpandedScenario(isExp?null:scKey),style:{padding:"16px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,background:isExp?sc.color+"06":C.surface,transition:"all 0.2s"}},
              e("span",{style:{fontFamily:mono,fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:4,background:sc.color+"12",color:sc.color}},sc.id),
              e("span",{style:{fontSize:14,fontWeight:600,flex:1}},sc.name),
              e("div",{style:{textAlign:"right",flexShrink:0}},e("div",{style:{fontFamily:mono,fontSize:16,fontWeight:600,color:sc.color}},6),e("div",{style:{fontSize:9,color:C.textDim,letterSpacing:"0.04em"}},"MODULES")),
              e("div",{style:{fontSize:14,color:isExp?sc.color:C.textDim,marginLeft:8,transition:"transform 0.2s",transform:isExp?"rotate(180deg)":"rotate(0deg)"}},"▼")
            ),
            isExp?e("div",{style:{padding:"0 20px 20px",background:C.bg,borderTop:"1px solid "+C.border,animation:"slideIn 0.25s ease"}},
              e("div",{style:{fontSize:12,color:C.textMid,lineHeight:1.6,margin:"14px 0"}},sc.desc),
              e("div",{style:{fontSize:10,fontWeight:600,color:C.textDim,letterSpacing:"0.04em",marginBottom:8}},"MODULE SEQUENCE"),
              e("div",{style:{display:"flex",flexDirection:"column",gap:4}},
                sc.modules.map((m,j)=>e("div",{key:j,style:{display:"flex",alignItems:"flex-start",gap:10}},
                  e("div",{style:{width:24,height:24,borderRadius:"50%",background:C.surface,border:"1px solid "+C.border,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:mono,fontSize:11,fontWeight:700,color:C.textDim,flexShrink:0}},j+1),
                  e("div",null,e("div",{style:{fontSize:12,fontWeight:600,color:C.text}},m),e("div",{style:{fontSize:11,color:C.textDim,marginTop:2}},sc.descs[j]||""))
                ))
              )
            ):null
          );
        })
      ),
      // Limitations only (cost section removed)
      e("div",{style:{fontSize:12,fontWeight:600,color:C.accent,letterSpacing:"0.04em",marginBottom:12,textTransform:"uppercase"}},"Architecture Notes"),
      e("div",{style:{padding:20,borderRadius:12,background:C.surface,border:"1px solid "+C.border}},
        e("div",{style:{fontSize:13,fontWeight:600,color:C.danger,marginBottom:12}},"⚠ Known Limitations (Phase 1)"),
        e("div",{style:{display:"flex",flexDirection:"column",gap:8}},
          data.limits.map((l,i)=>e("div",{key:i,style:{display:"flex",alignItems:"flex-start",gap:8,fontSize:13,color:C.textMid,lineHeight:1.5}},e("span",{style:{color:C.danger,flexShrink:0,fontWeight:700,marginTop:1}},"•"),l))
        )
      )
    );
  }

  const viewMap = {overview:overviewView,prototype:prototypeView,howitworks:howItWorksView,buildspec:buildSpecView};
  const content = (viewMap[activeView]||overviewView)();

  return e("div",{style:{display:"flex",minHeight:"100vh"}},
    editorPanel(),
    e("div",{style:{flex:1,minHeight:"100vh",background:C.bg,position:"relative",transition:"margin-left 0.3s ease",marginLeft:panelOpen?380:0}},
      e("div",{style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,backgroundImage:"linear-gradient("+C.border+"33 1px, transparent 1px), linear-gradient(90deg, "+C.border+"33 1px, transparent 1px)",backgroundSize:"60px 60px"}}),
      e("div",{style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}},
        Array.from({length:12},(_,i)=>e("div",{key:i,style:{position:"absolute",width:2,height:2,borderRadius:"50%",background:C.accent,opacity:0,left:(Math.random()*100)+"%",top:"100%",animation:"floatUp 10s "+(i*0.9)+"s infinite ease-out"}}))
      ),
      e("header",{style:{position:"relative",zIndex:10,padding:"20px 28px 16px",borderBottom:"1px solid "+C.border,background:"linear-gradient(180deg,"+C.surface+" 0%,"+C.bg+" 100%)"}},
        e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}},
          e("div",{style:{display:"flex",alignItems:"center",gap:12}},
            !panelOpen?e("button",{onClick:()=>setPanelOpen(true),title:"Open Editor",style:{width:32,height:32,borderRadius:6,border:"1px solid "+C.border,background:C.surface,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:C.accent,flexShrink:0,transition:"all 0.2s"}},"✏️"):null,
            e("div",{style:{display:"flex",alignItems:"baseline",gap:4}},e("span",{style:{fontSize:20,fontWeight:700,color:C.logo,letterSpacing:"-0.02em"}},"MANAGE"),e("span",{style:{fontSize:20,fontWeight:700,color:C.accent,letterSpacing:"-0.02em"}},"AI")),
            e("div",{style:{width:1,height:20,background:C.border}}),
            e("div",null,
              e("div",{style:{fontSize:12,fontWeight:600}},data.clientName+" — "+data.solutionName),
              e("div",{style:{fontSize:9,color:C.textDim,marginTop:1,fontFamily:mono}},"Solution Demo v"+data.version+" · "+data.stack)
            )
          ),
          e("div",{style:{display:"flex",gap:2,background:C.surface2,borderRadius:8,padding:3,border:"1px solid "+C.border,flexWrap:"wrap"}},views.map(v=>navBtn(v)))
        )
      ),
      e("main",{style:{position:"relative",zIndex:5,padding:"30px 28px",maxWidth:1400,margin:"0 auto"}},content),
      e("footer",{style:{position:"relative",zIndex:5,padding:"16px 28px",borderTop:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}},
        e("div",{style:{fontSize:11,color:C.textDim}},e("span",{style:{color:C.logo}},"MANAGE"),e("span",{style:{color:C.accent}},"AI")," · "+data.solutionName+" Solution Demo v"+data.version+" · March 2026"),
        e("div",{style:{fontSize:10,color:C.textDim,fontFamily:mono}},"CONFIDENTIAL — "+data.confidentialLine)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
