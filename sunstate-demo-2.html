  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

<script>

const { useState, useEffect } = React;

  accent:"#4A8FD6",accentDim:"rgba(74,143,214,0.07)",bg:"#FFFFFF",

const mono = "'JetBrains Mono', monospace";

      {icon:"⚙️",label:"JS Engine",sub:"Analysis + Scoring",clr:C.teal},
      {icon:"🤖",label:"GPT-4.1",sub:"HTML Render",clr:C.purple},

      {id:"daily",label:"Daily Alert",badge:"VM-01",color:C.orange,src:"sunstate-daily.html",desc:"Detects consecutive zero-admission days with tier-specific thresholds. Calculates daily admissions, 7-day rolling averages, and half-over-half trend percentages. Sent with High importance flag."},
    ],

      {num:1,title:"Trigger — On-Demand Execution",color:C.orange,desc:"Each scenario is initiated via on-demand trigger (Start Subscenario module). In Phase 1 this is manual or API-triggered. Phase 2 adds cron scheduling — Daily at 7 AM, Weekly on Mondays at 8 AM, Monthly on the 1st at 9 AM, and Quarterly at Q-start."},

      {num:4,title:"AI Rendering — GPT-4.1 HTML Email Generation",color:C.success,desc:"GPT-4.1 receives the structured JSON output and fills placeholder tokens in a pre-defined HTML skeleton. The LLM is a template renderer only — all calculations happen in the JavaScript engine. Temperature is set to 0 for maximum consistency.",detail:"Model: gpt-4.1 · Temperature: 0 · Role: Template renderer\nInput: Structured JSON from JS analysis\nOutput: Complete branded HTML email with badges, tables, conditional sections\n⚠ LLM-dependent rendering = known reliability risk (Phase 2 → MJML)"},

      {icon:"📊",title:"Weekly Analysis",color:C.teal,desc:"Groups trips by ISO week (Mon-Sun). Compares current week against 13-week rolling averages and prior-week totals. Ranks top 20 facilities by admission volume with week-over-week tracking."},
      {icon:"📈",title:"Monthly Analysis",color:C.accent,desc:"Breaks the month into Week 1–4 buckets (days 1-7, 8-14, 15-21, 22+). Tracks intra-month admission progression per facility. Computes Week 1 → Week 4 trend percentage with severity scoring."},
      {icon:"🎯",title:"Quarterly Analysis",color:C.purple,desc:"Strategic-level analysis across the full dataset. Splits date range into halves. Flags churn risks (≤-15% decline) and growth opportunities (≥+15% increase) with tier-specific action recommendations."},

      {icon:"JS",name:"JavaScript",role:"Analysis Engine (Make Code Module)",color:C.warning,isMono:true},
      {icon:"🤖",name:"GPT-4.1",role:"HTML Template Renderer",color:C.purple},
      {icon:"📧",name:"Microsoft Outlook",role:"Email Delivery",color:C.accent},
      {icon:"📝",name:"Notion",role:"Audit Trail Database",color:C.textDim},
    ],
    scenarios:[
      {id:"VM-01",name:"Daily Volume Alert",color:C.orange,desc:"Reads the Bambi trip export, filters to completed trips, identifies the most recent date, calculates daily admissions and 7-day averages, detects consecutive zero-admission days, and computes half-over-half trend percentages. Renders branded HTML email via GPT-4.1 and delivers through Outlook.",modules:["Scenario Service → Start Subscenario","Google Sheets → Make an API Call","Code → Execute JavaScript","OpenAI → Create Chat Completion","Microsoft Email → Create and Send","Notion → Make an API Call"],descs:["On-demand trigger entry point","batchGet 5 columns (A, D, O, P, BH) from TripsData","Zero-day detection, trend analysis, severity scoring, JSON output","GPT-4.1 fills HTML template placeholders (temp: 0)","Delivers branded HTML email via Outlook (High importance)","Logs execution: Report Type 'Daily', Scenario ID '4266048'"]},
      {id:"VM-02",name:"Weekly Volume Alert",color:C.teal,desc:"Aggregates trip data by ISO week, compares current week's admissions against 13-week rolling averages and prior-week totals for the top 20 facilities. Computes week-over-week and vs-13-week percentage changes.",modules:["Scenario Service → Start Subscenario","Google Sheets → Make an API Call","Code → Execute JavaScript","OpenAI → Create Chat Completion","Microsoft Email → Create and Send","Notion → Make an API Call"],descs:["On-demand trigger entry point","Identical batchGet — same 5 columns","ISO week grouping, 13-week rolling avg, top-20 ranking, severity scoring","GPT-4.1 renders weekly HTML template","Outlook delivery (Normal importance)","Report Type 'Weekly', Scenario ID '4131076'"]},
      {id:"VM-03",name:"Monthly Volume Report",color:C.accent,desc:"Analyzes the most recent calendar month's trip data. Breaks the month into Week 1–4 buckets, tracks intra-month admission progression per facility and computes month-over-month trend scoring.",modules:["Scenario Service → Start Subscenario","Google Sheets → Make an API Call","Code → Execute JavaScript","OpenAI → Create Chat Completion","Microsoft Email → Create and Send","Notion → Make an API Call"],descs:["On-demand trigger entry point","Identical batchGet — same 5 columns","Monthly bucketing (Wk1-4), intra-month trends, facility scoring","GPT-4.1 renders monthly HTML template","Outlook delivery (Normal importance)","Report Type 'Monthly', Scenario ID '4266055'"]},
      {id:"VM-04",name:"Quarterly Strategic Assessment",color:C.purple,desc:"Performs strategic-level analysis across the full dataset. Identifies facilities at risk of churn with tier-specific action recommendations, and flags growth opportunities for account nurturing. Generates executive-ready quarterly report.",modules:["Scenario Service → Start Subscenario","Google Sheets → Make an API Call","Code → Execute JavaScript","OpenAI → Create Chat Completion","Microsoft Email → Create and Send","Notion → Make an API Call"],descs:["On-demand trigger entry point","Identical batchGet — same 5 columns","Churn detection, growth identification, strategic recommendations","GPT-4.1 renders quarterly HTML template","Outlook delivery (Normal importance)","Report Type 'Quarterly', Scenario ID '4266060'"]},
    ],

      "Google Sheets 5K row cap — may hit ceiling as data grows",

    ],

}

// ============ EDITOR HELPERS ============
function EditorField({label, value, onChange, multi, mono: isMono}) {
  const base = {width:"100%",padding:"7px 10px",borderRadius:6,border:"1px solid "+C.border,background:C.bg,color:C.text,fontSize:12,fontFamily:"'DM Sans', sans-serif"};
  const style = {...base, ...(isMono ? {fontFamily:mono,fontSize:11} : {}), ...(multi ? {resize:"vertical",minHeight:54} : {})};
  return e("div",{style:{marginBottom:8}},
    e("label",{style:{fontSize:9,fontWeight:600,color:C.textDim,letterSpacing:"0.05em",display:"block",marginBottom:3,textTransform:"uppercase"}},label),
    multi ? e("textarea",{value:value||"",onChange:ev=>onChange(ev.target.value),style}) : e("input",{type:"text",value:value||"",onChange:ev=>onChange(ev.target.value),style})
  );
}

// ============ MAIN APP ============
function App() {
  const [data, setData] = useState(getDefaultData());
  const [panelOpen, setPanelOpen] = useState(false);
  const [editSection, setEditSection] = useState("overview");
  const [activeView, setActiveView] = useState("overview");
  const [activeProto, setActiveProto] = useState("quarterly");
  const [expandedScenario, setExpandedScenario] = useState("vm01");
  const [animPhase, setAnimPhase] = useState(0);

  useEffect(() => {
    const i = setInterval(() => setAnimPhase(p => (p+1) % 6), 2800);
    return () => clearInterval(i);
  }, []);

  function upd(path, value) {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split(".");
      let obj = next;
      for (let i = 0; i < keys.length - 1; i++) {
        const k = /^\d+$/.test(keys[i]) ? parseInt(keys[i]) : keys[i];
        obj = obj[k];
      }
      const last = /^\d+$/.test(keys[keys.length-1]) ? parseInt(keys[keys.length-1]) : keys[keys.length-1];
      obj[last] = value;
      return next;
    });
  }
  function addItem(path, template) {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split(".");
      let obj = next;
      for (let i = 0; i < keys.length; i++) { obj = obj[/^\d+$/.test(keys[i]) ? parseInt(keys[i]) : keys[i]]; }
      obj.push(JSON.parse(JSON.stringify(template)));
      return next;
    });
  }
  function removeItem(path, index) {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split(".");
      let obj = next;
      for (let i = 0; i < keys.length; i++) { obj = obj[/^\d+$/.test(keys[i]) ? parseInt(keys[i]) : keys[i]]; }
      obj.splice(index, 1);
      return next;
    });
  }

  const cardStyle = {padding:12,borderRadius:8,background:C.bg,border:"1px solid "+C.border,marginBottom:8};
  const rmBtnStyle = {background:"none",border:"none",color:C.danger,cursor:"pointer",fontSize:13,padding:"2px 5px",fontWeight:700};
  const addBtnStyle = {width:"100%",padding:"7px",borderRadius:6,border:"1px dashed "+C.border,background:"transparent",color:C.accent,fontSize:10,cursor:"pointer",fontFamily:"'DM Sans', sans-serif",fontWeight:600,marginTop:4};

  function simpleArrayEditor(label, path, arr) {
    return e("div",{style:{marginBottom:14}},
      label ? e("div",{style:{fontSize:10,fontWeight:600,color:C.accent,marginBottom:6}},label) : null,
      arr.map((item,i) =>
        e("div",{key:i,style:{display:"flex",gap:4,marginBottom:4}},
          e("input",{type:"text",value:item,onChange:ev=>upd(path+"."+i,ev.target.value),style:{flex:1,padding:"7px 10px",borderRadius:6,border:"1px solid "+C.border,background:C.bg,color:C.text,fontSize:12,fontFamily:"'DM Sans', sans-serif"}}),
          e("button",{onClick:()=>removeItem(path,i),style:rmBtnStyle},"×")
        )
      ),
      e("button",{onClick:()=>addItem(path,"New item"),style:addBtnStyle},"+ Add")
    );
  }

  function arrayEditor(label, path, arr, fields, template) {
    return e("div",{style:{marginBottom:14}},
      e("div",{style:{fontSize:10,fontWeight:600,color:C.accent,marginBottom:6,letterSpacing:"0.04em"}},label),
      arr.map((item,i) =>
        e("div",{key:i,style:cardStyle},
          e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
            e("span",{style:{fontSize:10,fontWeight:600,color:C.textMid}},"#"+(i+1)),
            e("button",{onClick:()=>removeItem(path,i),style:rmBtnStyle},"×")
          ),
          fields.map(f => e(EditorField,{key:f.key,label:f.label,value:item[f.key],onChange:v=>upd(path+"."+i+"."+f.key,v),multi:f.multi,mono:f.mono}))
        )
      ),
      e("button",{onClick:()=>addItem(path,template),style:addBtnStyle},"+ Add")
    );
  }

  // ============ EDITOR SECTIONS ============
  const editorSections = {
    overview: () => e("div",null,
      e(EditorField,{label:"Client Name",value:data.clientName,onChange:v=>upd("clientName",v)}),
      e(EditorField,{label:"Solution Name",value:data.solutionName,onChange:v=>upd("solutionName",v)}),
      e(EditorField,{label:"Version",value:data.version,onChange:v=>upd("version",v)}),
      e(EditorField,{label:"Stack",value:data.stack,onChange:v=>upd("stack",v)}),
      e(EditorField,{label:"Confidential Line",value:data.confidentialLine,onChange:v=>upd("confidentialLine",v)}),
      e(EditorField,{label:"Overview Title",value:data.overviewTitle,onChange:v=>upd("overviewTitle",v)}),
      e(EditorField,{label:"Overview Description",value:data.overviewDesc,onChange:v=>upd("overviewDesc",v),multi:true}),
      simpleArrayEditor("IN SCOPE","scopeIn",data.scopeIn),
      simpleArrayEditor("OUT OF SCOPE","scopeOut",data.scopeOut),
    ),
    stats: () => e("div",null,
      arrayEditor("STAT CARDS","stats",data.stats,[{label:"Label",key:"label"},{label:"Value",key:"value"},{label:"Sub",key:"sub"}],{label:"New Stat",value:"0",sub:"Description",color:C.accent}),
      arrayEditor("EXECUTION FLOW","flow",data.flow,[{label:"Icon",key:"icon"},{label:"Label",key:"label"},{label:"Sub",key:"sub"}],{icon:"📋",label:"New Step",sub:"Description",clr:C.accent}),
    ),
    prototype: () => e("div",null,
      data.protoTabs.map((tab,i) =>
        e("div",{key:i,style:cardStyle},
          e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
            e("span",{style:{fontSize:10,fontWeight:600,color:tab.color}},tab.badge),
            e("button",{onClick:()=>removeItem("protoTabs",i),style:rmBtnStyle},"×")
          ),
          e(EditorField,{label:"Label",value:tab.label,onChange:v=>upd(`protoTabs.${i}.label`,v)}),
          e(EditorField,{label:"Badge",value:tab.badge,onChange:v=>upd(`protoTabs.${i}.badge`,v)}),
          e(EditorField,{label:"Source File",value:tab.src,onChange:v=>upd(`protoTabs.${i}.src`,v),mono:true}),
          e(EditorField,{label:"Description",value:tab.desc,onChange:v=>upd(`protoTabs.${i}.desc`,v),multi:true}),
        )
      ),
    ),
    howitworks: () => e("div",null,
      data.steps.map((step,i) =>
        e("div",{key:i,style:cardStyle},
          e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
            e("span",{style:{fontSize:10,fontWeight:600,color:C.textMid}},"Step "+step.num),
            e("button",{onClick:()=>removeItem("steps",i),style:rmBtnStyle},"×")
          ),
          e(EditorField,{label:"Title",value:step.title,onChange:v=>upd(`steps.${i}.title`,v)}),
          e(EditorField,{label:"Description",value:step.desc,onChange:v=>upd(`steps.${i}.desc`,v),multi:true}),
          e(EditorField,{label:"Detail (optional)",value:step.detail||"",onChange:v=>upd(`steps.${i}.detail`,v),multi:true,mono:true}),
        )
      ),
      e("button",{onClick:()=>addItem("steps",{num:data.steps.length+1,title:"New Step",color:C.accent,desc:"Description..."}),style:addBtnStyle},"+ Add Step"),
      arrayEditor("CADENCES","cadences",data.cadences,[{label:"Icon",key:"icon"},{label:"Title",key:"title"},{label:"Description",key:"desc",multi:true}],{icon:"📊",title:"New Cadence",color:C.accent,desc:"Description..."}),
    ),
    scenarios: () => e("div",null,
      data.scenarios.map((sc,i) =>
        e("div",{key:i,style:{...cardStyle,marginBottom:12}},
          e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8}},
            e("span",{style:{fontSize:11,fontWeight:700,color:sc.color,fontFamily:mono}},sc.id),
            e("button",{onClick:()=>removeItem("scenarios",i),style:rmBtnStyle},"×")
          ),
          e(EditorField,{label:"Name",value:sc.name,onChange:v=>upd(`scenarios.${i}.name`,v)}),
          e(EditorField,{label:"Description",value:sc.desc,onChange:v=>upd(`scenarios.${i}.desc`,v),multi:true}),
          e("div",{style:{fontSize:10,fontWeight:600,color:C.purple,marginBottom:4,marginTop:6}},"MODULE LIST"),
          sc.modules.map((m,j) =>
            e("div",{key:j,style:{display:"flex",gap:4,marginBottom:3}},
              e("span",{style:{fontFamily:mono,fontSize:10,color:C.accent,padding:"6px 0",minWidth:16}},j+1),
              e("input",{type:"text",value:m,onChange:ev=>upd(`scenarios.${i}.modules.${j}`,ev.target.value),style:{flex:1,padding:"5px 8px",borderRadius:5,border:"1px solid "+C.border,background:C.bg,color:C.text,fontSize:11}}),
              e("button",{onClick:()=>removeItem(`scenarios.${i}.modules`,j),style:rmBtnStyle},"×")
            )
          ),
          e("button",{onClick:()=>{addItem(`scenarios.${i}.modules`,"New module");addItem(`scenarios.${i}.descs`,"Module description");},style:{...addBtnStyle,marginTop:4}},"+ Add Module"),
          e("div",{style:{fontSize:10,fontWeight:600,color:C.teal,marginBottom:4,marginTop:8}},"MODULE DESCRIPTIONS"),
          sc.descs.map((d,j) =>
            e("div",{key:j,style:{display:"flex",gap:4,marginBottom:3}},
              e("span",{style:{fontFamily:mono,fontSize:10,color:C.teal,padding:"6px 0",minWidth:16}},j+1),
              e("input",{type:"text",value:d,onChange:ev=>upd(`scenarios.${i}.descs.${j}`,ev.target.value),style:{flex:1,padding:"5px 8px",borderRadius:5,border:"1px solid "+C.border,background:C.bg,color:C.text,fontSize:11}})
            )
          ),
        )
      ),
    ),
    limits: () => e("div",null,
      simpleArrayEditor("KNOWN LIMITATIONS","limits",data.limits),
      arrayEditor("TIERS","tiers",data.tiers,[{label:"Tier",key:"tier"},{label:"Criteria",key:"criteria"},{label:"Example",key:"ex"}],{tier:"New Tier",criteria:"Criteria...",ex:"Example...",color:C.accent}),
      arrayEditor("SEVERITY LEVELS","sevs",data.sevs,[{label:"Severity",key:"sev"},{label:"Threshold",key:"threshold"},{label:"Action",key:"action"}],{sev:"NEW",threshold:"Threshold...",action:"Action...",color:C.accent}),
    ),
  };

            e("div",{style:{width:1,height:20,background:C.border}}),
            e("div",null,
              e("div",{style:{fontSize:12,fontWeight:600}},data.clientName+" — "+data.solutionName),
              e("div",{style:{fontSize:9,color:C.textDim,marginTop:1,fontFamily:mono}},"Solution Demo v"+data.version+" · "+data.stack)
            )
          ),
          e("div",{style:{display:"flex",gap:2,background:C.surface2,borderRadius:8,padding:3,border:"1px solid "+C.border,flexWrap:"wrap"}},views.map(v=>navBtn(v)))
        )
      ),
      e("main",{style:{position:"relative",zIndex:5,padding:"30px 28px",maxWidth:1400,margin:"0 auto"}},content),
      e("footer",{style:{position:"relative",zIndex:5,padding:"16px 28px",borderTop:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}},
        e("div",{style:{fontSize:11,color:C.textDim}},e("span",{style:{color:C.logo}},"MANAGE"),e("span",{style:{color:C.accent}},"AI")," · "+data.solutionName+" Solution Demo v"+data.version+" · March 2026"),
        e("div",{style:{fontSize:10,color:C.textDim,fontFamily:mono}},"CONFIDENTIAL — "+data.confidentialLine)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
